data:
  train_csv: DataChallenge2026/occlusion_datasets/train.csv
  test_csv: DataChallenge2026/occlusion_datasets/test_students.csv
  image_root: crops/Crop_224_5fp_100K
  val_split: 0.2
  seed: 999                  # 2e seed Large (large_v1=123) → diversité gros modèle

model:
  backbone: convnext_large
  pretrained: true
  dropout: 0.3
  head_dims: [512, 128]

training:
  epochs: 30
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 0
  use_weighted_sampler: true
  gender_balance: true
  male_boost: 2.5            # recette PROPRE — pas de synth/tail/gt-scaled

augmentation:
  horizontal_flip: 0.5
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.2
  rotation_degrees: 20
  gaussian_blur_p: 0.4

output:
  checkpoint_dir: checkpoints
  log_dir: logs
  submission_dir: submissions
  experiment_name: convnext_large_s999
