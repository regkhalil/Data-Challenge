data:
  train_csv: DataChallenge2026/occlusion_datasets/train.csv
  test_csv: DataChallenge2026/occlusion_datasets/test_students.csv
  image_root: crops/Crop_224_5fp_100K
  val_split: 0.2
  seed: 42

model:
  backbone: vit_base_patch16_224
  pretrained: true
  dropout: 0.1
  head_dims: [512, 128]

training:
  epochs: 40
  batch_size: 16             # ViT-Base 86M params — petit batch pour tenir dans 3090
  lr: 0.00005               # ViT bénéficie d'un LR plus faible que les CNN
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 5          # warmup indispensable pour les ViT
  use_weighted_sampler: true
  gender_balance: true
  male_boost: 2.0

augmentation:
  horizontal_flip: 0.5
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
  rotation_degrees: 15
  gaussian_blur_p: 0.3

output:
  checkpoint_dir: checkpoints
  log_dir: logs
  submission_dir: submissions
  experiment_name: vit_base_v1
